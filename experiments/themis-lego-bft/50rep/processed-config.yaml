---
general:
  stop_time: 10 sec
  seed: 1
  parallelism: 20
  bootstrap_end_time: 0 sec
  log_level: info
  heartbeat_interval: 1 sec
  data_directory: /home/raphael/Documents/tool/experiments/themis-lego-bft/50rep
  template_directory: ~
  progress: false
  model_unblocked_syscall_latency: false
network:
  graph:
    type: gml
    file:
      path: network.gml
      compression: ~
  use_shortest_path: false
experimental:
  use_sched_fifo: false
  use_explicit_block_message: false
  use_seccomp: true
  use_syscall_counters: true
  use_object_counters: true
  use_preload_libc: true
  use_preload_openssl_rng: true
  use_preload_openssl_crypto: false
  preload_spin_max: 0
  use_memory_manager: false
  use_shim_syscall_handler: true
  use_cpu_pinning: true
  runahead: 630 μs
  use_dynamic_runahead: false
  scheduler_policy: host
  socket_send_buffer: 131072 B
  socket_send_autotune: true
  socket_recv_buffer: 174760 B
  socket_recv_autotune: true
  interface_buffer: 1024000 B
  interface_qdisc: fifo
  worker_threads: ~
  use_legacy_working_dir: true
  host_heartbeat_log_level: info
  host_heartbeat_log_info:
    - node
  host_heartbeat_interval: ~
  strace_logging_mode: "off"
  max_unapplied_cpu_latency: 1 μs
  unblocked_syscall_latency: 1 μs
  unblocked_vdso_latency: 10 ns
hosts:
  themisClient0:
    network_node_id: 50
    processes:
      - path: /home/raphael/Documents/tool/themis-lego-bft/target/debug/bench-client
        args: "-d 8 --config config/delphi --payload 256 -c 50 --concurrent 1000"
        environment: RUST_LOG=info
        quantity: 1
        start_time: 2 sec
        stop_time: ~
    ip_addr: 11.79.38.105
    quantity: 1
    bandwidth_down: ~
    bandwidth_up: ~
    options:
      log_level: ~
      pcap_directory: ~
      pcap_capture_size: 65535 B
